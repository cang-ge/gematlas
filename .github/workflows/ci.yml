# CI — validate data, run tests, verify build
# ponytail: single workflow, conditional deploy step — not two separate files.
name: CI

on:
  push:
  pull_request:

# ponytail: explicit permissions are needed — GITHUB_TOKEN defaults to read on
# `contents`, which blocks peaceiris/actions-gh-pages from pushing gh-pages.
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit
      - run: pnpm validate:data
      - run: pnpm test
      - run: pnpm build

      # Deploy to GitHub Pages on push to default branch only.
      # ponytail: match against github.event.repository.default_branch rather than
      # hardcoding "main" — GemAtlas uses master as the default branch.
      - name: Deploy to GitHub Pages
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/.vitepress/dist
          publish_branch: gh-pages
